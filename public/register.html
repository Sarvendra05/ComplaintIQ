<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register as a citizen on ComplaintIQ">
    <title>Register - ComplaintIQ</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page-content">
        <div class="auth-container">
            <div class="auth-card" style="max-width:520px;">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Register as a citizen to file complaints</p>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="phone" placeholder="Phone number">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Area</label>
                            <input type="text" class="form-control" id="area" placeholder="Your area/zone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password *</label>
                        <input type="password" class="form-control" id="password" placeholder="Create a password (min 6 chars)" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;" id="registerBtn">
                        Create Account
                    </button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="/login.html">Sign in here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
    <script>
        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const data = await apiRequest('/auth/register', {
                    method: 'POST',
                    body: {
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        area: document.getElementById('area').value,
                        password
                    }
                });

                if (data) {
                    setAuth(data.token, { role: data.role, name: data.name });
                    showToast('Registration successful!', 'success');
                    setTimeout(() => {
                        window.location.href = '/complaint-form.html';
                    }, 500);
                }
            } catch (err) {
                showToast(err.message || 'Registration failed', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }
    </script>
</body>
</html>
