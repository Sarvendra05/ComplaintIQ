<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Complaints - ComplaintIQ</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page-content">
        <div class="container">
            <div class="page-header flex-between">
                <div>
                    <h1 class="page-title">📋 My Complaints</h1>
                    <p class="page-subtitle">Track the status of your registered complaints</p>
                </div>
                <a href="/complaint-form.html" class="btn btn-primary">+ New Complaint</a>
            </div>

            <!-- Stats -->
            <div class="grid-4" id="statsGrid" style="margin-bottom:24px;">
                <div class="stat-card primary">
                    <div class="stat-icon">📋</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statTotal">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-icon">⏳</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statPending">0</div>
                        <div class="stat-label">Pending</div>
                    </div>
                </div>
                <div class="stat-card info">
                    <div class="stat-icon">🔄</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statProgress">0</div>
                        <div class="stat-label">In Progress</div>
                    </div>
                </div>
                <div class="stat-card success">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statResolved">0</div>
                        <div class="stat-label">Resolved</div>
                    </div>
                </div>
            </div>

            <!-- Complaints Table -->
            <div class="card">
                <div class="card-header">
                    <span class="card-title">Complaint History</span>
                </div>
                <div id="complaintsContainer">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>© 2026 ComplaintIQ</p></div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth(['citizen'])) return;
            loadMyComplaints();
        });

        async function loadMyComplaints() {
            try {
                const complaints = await apiRequest('/complaints/mine');
                const container = document.getElementById('complaintsContainer');

                if (!complaints || complaints.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <p>No complaints yet. <a href="/complaint-form.html">File your first complaint</a></p>
                        </div>
                    `;
                    return;
                }

                // Update stats
                const total = complaints.length;
                const pending = complaints.filter(c => c.status === 'Pending').length;
                const progress = complaints.filter(c => c.status === 'In Progress').length;
                const resolved = complaints.filter(c => c.status === 'Resolved').length;
                document.getElementById('statTotal').textContent = total;
                document.getElementById('statPending').textContent = pending;
                document.getElementById('statProgress').textContent = progress;
                document.getElementById('statResolved').textContent = resolved;

                container.innerHTML = `
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Area</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Dept</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${complaints.map(c => `
                                    <tr>
                                        <td>#${c.complaint_id}</td>
                                        <td style="max-width:200px;">${c.title}</td>
                                        <td><span class="badge badge-category">${c.category}</span></td>
                                        <td>${c.area_name}</td>
                                        <td>${getPriorityBadge(c.priority)}</td>
                                        <td>${getStatusBadge(c.status)}</td>
                                        <td>${formatDate(c.date)}</td>
                                        <td>${c.dept_name || '<span style="color:var(--text-muted);">Unassigned</span>'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (err) {
                showToast('Failed to load complaints', 'error');
            }
        }
    </script>
</body>
</html>
