<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Complaint - ComplaintIQ</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>

    <div class="page-content">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">📝 File a New Complaint</h1>
                <p class="page-subtitle">Report a public issue in your area</p>
            </div>

            <div class="card" style="max-width:700px;">
                <form id="complaintForm" onsubmit="submitComplaint(event)">
                    <div class="form-group">
                        <label class="form-label">Complaint Title *</label>
                        <input type="text" class="form-control" id="title" placeholder="Brief title of the issue" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Category *</label>
                            <select class="form-control" id="category" required>
                                <option value="">Select Category</option>
                                <option value="Road">🛣️ Road</option>
                                <option value="Water">💧 Water</option>
                                <option value="Garbage">🗑️ Garbage</option>
                                <option value="Light">💡 Streetlight</option>
                                <option value="Drainage">🌊 Drainage</option>
                                <option value="Other">📋 Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Priority *</label>
                            <select class="form-control" id="priority" required>
                                <option value="Low">Low</option>
                                <option value="Medium" selected>Medium</option>
                                <option value="High">High</option>
                                <option value="Critical">Critical</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Area *</label>
                        <select class="form-control" id="area_id" required>
                            <option value="">Loading areas...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description *</label>
                        <textarea class="form-control" id="description" placeholder="Describe the issue in detail..." required></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Proof Image (Optional, max 2MB)</label>
                        <input type="file" class="form-control" id="image" accept=".jpg,.jpeg,.png" style="padding: 10px;">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="text" class="form-control" id="dateField" disabled>
                    </div>

                    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:8px;">
                        <a href="/my-complaints.html" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary" id="submitBtn">Submit Complaint</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container"><p>© 2026 ComplaintIQ</p></div>
    </footer>

    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (!requireAuth(['citizen'])) return;
            loadAreas('area_id');
            document.getElementById('dateField').value = new Date().toLocaleDateString('en-IN', {
                day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
            });
        });

        async function submitComplaint(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const formData = new FormData();
                formData.append('title', document.getElementById('title').value);
                formData.append('description', document.getElementById('description').value);
                formData.append('category', document.getElementById('category').value);
                formData.append('area_id', document.getElementById('area_id').value);
                formData.append('priority', document.getElementById('priority').value);
                
                const imageFile = document.getElementById('image').files[0];
                if (imageFile) {
                    formData.append('image', imageFile);
                }

                const data = await apiRequest('/complaints', {
                    method: 'POST',
                    body: formData
                });

                if (data) {
                    showToast('Complaint registered successfully!', 'success');
                    setTimeout(() => window.location.href = '/my-complaints.html', 1000);
                }
            } catch (err) {
                showToast(err.message || 'Failed to submit complaint', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit Complaint';
            }
        }
    </script>
</body>
</html>
